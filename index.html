<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>まる家計</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🐻 まる家計</h1>
<div class="card">
    <h2>今月の収入</h2>
    <p id="income">¥0</p>
</div>
<div class="card">
    <h2>今月の支出</h2>
    <p id="spent">¥0</p>
</div>

<div class="card">
    <h2>残り予算</h2>
    <p id="remain">¥150,000</p>
</div>

<div class="card">
    <h2 id="daily">今日あと ¥5,000 使えます</h2>
</div>
<div class="card">

    <h2>予算一覧</h2>

    <div id="budgetList"></div>
<div class="card">
    <h2>カテゴリ別</h2>
    <div id="budgetList"></div>
</div>
</div>
<button onclick="addExpense()">
支出を追加
</button>

<script src="app.js"></script>

</body>
</html>
