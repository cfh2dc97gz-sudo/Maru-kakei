<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まる家計</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🐻 まる家計</h1>

<div class="card">
    <h2 id="period">6/25〜7/24</h2>
</div>

<div class="card">
    <h2>🎯 年間目標</h2>
    <h1 id="goal">¥3,400,000</h1>
    <p id="forecast">現在予測 ¥0</p>
    <p id="advice">まず収入を入力しましょう😊</p>
</div>

<div class="card">
    <h2>💰 収入</h2>

    <button onclick="addIncome('パパ')">👨 パパ</button>
    <button onclick="addIncome('ママ')">👩 ママ</button>
    <button onclick="addIncome('臨時')">🎁 臨時</button>
    <button onclick="addIncome('パパボーナス')">💴 パパ賞与</button>
    <button onclick="addIncome('ママボーナス')">💴 ママ賞与</button>

    <h2 id="income">¥0</h2>
</div>

<div class="card">
    <h2>➕ 入力</h2>

    <div id="budgetList" class="input-grid"></div>

</div>
<div class="card">
    <h2>🤖 AI提案</h2>

    <p id="advice">
        今日もおつかれさま😊
    </p>
</div>

<div class="card">
    <h2>🎯 目標ナビ</h2>

    <h2 id="goal">¥3,400,000</h2>

    <p id="forecast">現在予測 ¥0</p>

    <p id="need">
        あと ¥3,400,000
    </p>
</div>

<div class="card">
    <h2>💰 今月のお金</h2>

    <p>収入 <span id="income">¥0</span></p>

    <p>支出 <span id="spent">¥0</span></p>

    <p>残り <span id="remain">¥0</span></p>
</div>
<div class="card">
    <h2>📜 履歴</h2>
    <div id="historyList"></div>
</div>



<button onclick="resetMonth()">🗑 今月リセット</button>

<script src="app.js"></script>

</body>
</html>
