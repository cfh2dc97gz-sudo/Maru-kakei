<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まる家計</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🐻 まる家計</h1>

<div class="card">
    <h2 id="period">6/25〜7/24</h2>
</div>

<div class="card">
    <h2>🎯 年間目標</h2>
    <h1 id="goal">¥3,400,000</h1>
    <p id="forecast">現在予測 ¥0</p>
    <p id="advice">まず収入を入力しましょう😊</p>
</div>

<div class="card">
    <h2>💰 収入</h2>

    <button onclick="addIncome('パパ')">👨 パパ</button>
    <button onclick="addIncome('ママ')">👩 ママ</button>
    <button onclick="addIncome('臨時')">🎁 臨時</button>
    <button onclick="addIncome('パパボーナス')">💴 パパ賞与</button>
    <button onclick="addIncome('ママボーナス')">💴 ママ賞与</button>

    <h2 id="income">¥0</h2>
</div>

<div class="card">
    <h2>📊 予算一覧</h2>
    <div id="budgetList"></div>
</div>

<div class="card">
    <h2>📜 履歴</h2>
    <div id="historyList"></div>
</div>

<div class="card">
    <h2>➕ 支出入力</h2>

    <button onclick="addFood()">🍚 食費</button>

    <button onclick="addHoliday()">🎉 休日</button>

    <button onclick="addGas()">⛽ ガソリン</button>

    <button onclick="addUtility()">💡 電気・水道</button>

    <button onclick="setIwagin()">🏦 岩銀</button>

    <button onclick="setRakuten()">💳 楽天</button>

</div>

<button onclick="resetMonth()">🗑 今月リセット</button>

<script src="app.js"></script>

</body>
</html>
