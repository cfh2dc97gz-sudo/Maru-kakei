<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>🐻 まる家計</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 月 -->

<div class="card">

    <div class="month-header">

        <button onclick="prevMonth()">◀</button>

        <h2 id="period">
            2026年4月
        </h2>

        <button onclick="nextMonth()">▶</button>

    </div>

</div>

<!-- 今月のお金 -->

<div class="card">

<h2>
💰 今月のお金
</h2>

<div class="summary-grid">

    <div class="summary-item">

        <div class="summary-title">
            収入
        </div>

        <div class="summary-money"
        id="incomeSummary">
            ¥0
        </div>

    </div>

    <div class="summary-item">

        <div class="summary-title">
            支出
        </div>

        <div class="summary-money"
        id="spent">
            ¥0
        </div>

    </div>

    <div class="summary-item">

        <div class="summary-title">
            残り
        </div>

        <div class="summary-money"
        id="remain">
            ¥0
        </div>

    </div>

</div>

</div>

<!-- AI -->

<div class="card">

<h2>
🤖 AI分析
</h2>

<p id="forecast">
現在予測 ¥0
</p>

<p id="advice">
今日もおつかれさま😊
</p>

</div>
<!-- カテゴリ -->

<div class="card">

<h2>
📒 カテゴリ
</h2>

<div id="foodArea"></div>

<div id="gridArea"></div>

</div>

<!-- 収入 -->

<div class="card">

<h2>
💰 収入
</h2>

<div class="income-grid">

<button onclick="addIncome('パパ')">
👨<br>パパ
</button>

<button onclick="addIncome('ママ')">
👩<br>ママ
</button>

<button onclick="addIncome('臨時')">
🎁<br>臨時
</button>

</div>

<div class="money" id="income">
¥0
</div>

<div id="incomeHistory"></div>

</div>

<!-- 年間目標（Ver11で年間ページへ移動予定） -->

<!--
<div class="card">

<h2>
🎯 年間目標
</h2>

<div class="money" id="goal">
¥3,400,000
</div>

</div>
-->

<button onclick="resetMonth()">
🗑 今月をリセット
</button>

<script src="app.js"></script>

</body>

</html>
