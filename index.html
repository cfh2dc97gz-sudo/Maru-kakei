<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>まる家計 Ver12</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ホーム -->

<div id="homePage">

    <!-- 月 -->

    <div class="card summary-card">

        <div class="month-header">

            <button id="prevMonth">◀</button>

            <div class="period-area">

                <select id="yearSelect">

                    <option value="2024">2024年度</option>

                    <option value="2025">2025年度</option>

                    <option value="2026" selected>2026年度</option>

                    <option value="2027">2027年度</option>

                </select>

                <h2 id="period">

                    4月

                </h2>

            </div>

            <div class="month-right">

                <button id="resetMonth" class="mini-reset">

                    🗑

                </button>

                <button id="nextMonth">

                    ▶

                </button>

            </div>

        </div>

    </div>

 <!-- 今月のお金 -->

<div class="card">

    <div class="summary-grid">

        <div class="summary-item">

            <div class="summary-title">
                収入
            </div>

            <div class="summary-money" id="incomeSummary">
                ¥0
            </div>

        </div>

        <div class="summary-item">

            <div class="summary-title">
                支出
            </div>

            <div class="summary-money" id="spent">
                ¥0
            </div>

        </div>

        <div class="summary-item">

            <div class="summary-title">
                残り
            </div>

            <div class="summary-money" id="remain">
                ¥0
            </div>

        </div>

    </div>

    <div class="bank-row" onclick="editBank()">

        <span class="bank-label">
            🏦 銀行残高
        </span>

        <span class="bank-total" id="bankTotal">
            ¥0
        </span>

        <span class="bank-saving plus" id="savingTotal">
            ¥0
        </span>

    </div>

</div>
    <!-- AI -->

    <div class="card ai-card">

        <h2>🤖 AIコンサルタント</h2>

       <div id="aiComment">

    分析中...

</div>
    </div>

    <!-- カテゴリ -->

    <div class="card">

        <div class="category-header">

            <h2>📒 カテゴリ</h2>

       <div class="family-card">

    <div
        class="family-image"
        id="familyImage">

        🌸

    </div>

    <div
        class="family-name"
        id="familyName">

        はる・りん

    </div>

    <div
        class="family-comment"
        id="familyComment">

        今日もがんばろう♪

    </div>

</div>

        </div>

        <div id="gridArea">

        </div>

    </div>

    <!-- 収入 -->

    <div class="card income-card">

        <h2>💰 収入</h2>

        <div class="income-grid">

            <button id="incomePapa">

                👨<br>パパ

            </button>

            <button id="incomeMama">

                👩<br>ママ

            </button>

            <button id="incomeExtra">

                🎁<br>臨時

            </button>

        </div>

        <div class="money" id="income">

            ¥0

        </div>

    </div>

</div>
<!-- 年間 -->

<div id="yearPage" class="page" style="display:none;">

    <div class="card">
<h2>📅 <span id="yearTitle">2026年度</span></h2>
    </div>

    <div class="card">

        <h2>🎯 年間目標</h2>

        <div id="yearGoal">

            ¥0 / ¥3,400,000

        </div>

        <div class="progress">

            <div id="goalBar"></div>

        </div>

    </div>

    <div class="card">

        <h2>💰 年間合計</h2>

        <div class="summary-grid">

            <div class="summary-item">

                <div class="summary-title">収入</div>

                <div class="summary-money" id="yearIncome">

                    ¥0

                </div>

            </div>

            <div class="summary-item">

                <div class="summary-title">支出</div>

                <div class="summary-money" id="yearSpent">

                    ¥0

                </div>

            </div>

            <div class="summary-item">

                <div class="summary-title">残り</div>

                <div class="summary-money" id="yearRemain">

                    ¥0

                </div>

            </div>

        </div>

    </div>

    <div class="card">

        <h2>📈 月別推移</h2>

  <canvas
    id="yearChart"
    class="year-chart"
    width="600"
    height="220">
</canvas>

    </div>

<div class="card">

    <h2>📒 カテゴリ分析</h2>

    <div id="yearCategory">

    </div>

</div>

<div class="card">

    <h2>💰 年間135万円管理</h2>

    <div id="annualItemList">

    </div>

    <button
        class="setting-item"
        id="addAnnualItem">

        ➕ 項目を追加

    </button>

</div>

</div>
<!-- 年間135万円管理 -->

<div id="annualPage"
     class="page"
     style="display:none;">

    <div class="card">

        <h2>💰 年間135万円管理</h2>

    </div>

    <div class="card">

        <div id="annualManageList">

        </div>

        <button
            class="setting-item"
            id="addAnnualManage">

            ➕ 項目を追加

        </button>

    </div>

</div>
    <!-- カテゴリ詳細 -->
<div id="categoryPage"
     class="page"
     style="display:none;">

    <div class="card">

        <button
            class="setting-item"
            onclick="showPage('year')">

            ← 年間ページへ戻る

        </button>

    </div>

    <div class="card">

        <h2 id="categoryTitle">

            📒 カテゴリ

        </h2>

    </div>

    <div class="card">

        <div id="categorySummary">

        </div>

    </div>

    <div id="categoryHistory">

    </div>

</div>
<!-- 設定 -->

<div id="settingPage" class="page" style="display:none;">

    <div class="card">

        <h2>⚙️ 設定</h2>

    </div>

    <div class="card">

        <button class="setting-item" id="editGoal">

            🎯 年間目標

        </button>

      <div class="setting-group">

    <h3>💰 ボーナス管理</h3>

    <button
        class="setting-item"
        id="editBonus">

        <span>夏・冬ボーナス</span>

        <span>編集</span>

    </button>

</div>

        <div id="budgetList">

        </div>
<button
    class="setting-item"
    id="annualManage">

    💰 年間135万円管理

</button>
        <button class="setting-item danger" id="deleteAll">

            🗑 全データ削除

        </button>

    </div>

</div>
<!-- ナビゲーション -->

<nav class="bottom-nav">

    <button class="active">

        🏠<br>

        <span>ホーム</span>

    </button>

    <button>

        📊<br>

        <span>年間</span>

    </button>

    <button>

        💰<br>

        <span>135万円</span>

    </button>

    <button>

        ⚙️<br>

        <span>設定</span>

    </button>

</nav>

<script src="app.js"></script>

</body>

</html>
