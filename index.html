<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>まる家計 Ver11</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 月 -->

<div class="card summary-card">
    
   <div class="month-header">

    <button id="prevMonth">◀</button>

    <h2 id="period">
        2026年4月
    </h2>

    <div class="month-right">

        <button id="resetMonth" class="mini-reset">
            🗑
        </button>

        <button id="nextMonth">
            ▶
        </button>

    </div>

</div>

</div>

<!-- 今月のお金 -->

<div class="card">

    <div class="summary-grid">

        <div class="summary-item">

            <div class="summary-title">
                収入
            </div>

            <div
                class="summary-money"
                id="incomeSummary">

                ¥0

            </div>

        </div>

        <div class="summary-item">

            <div class="summary-title">
                支出
            </div>

            <div
                class="summary-money"
                id="spent">

                ¥0

            </div>

        </div>

        <div class="summary-item">

            <div class="summary-title">
                残り
            </div>

            <div
                class="summary-money"
                id="remain">

                ¥0

            </div>

        </div>

    </div>

</div>

<!-- AI -->

<div class="card ai-card">

    <h2>🤖 AI分析</h2>

    <p id="forecast">

        現在予測 ¥0

    </p>

    <p id="advice">

        AI分析準備中

    </p>

</div>
<!-- カテゴリ -->

<div class="card">

    <div class="category-header">

        <h2>📒 カテゴリ</h2>

        <div class="family-card">

            <div class="family-image">

                👧🧒

            </div>

            <div class="family-name">

                はる・りん

            </div>

        </div>

    </div>

    <div id="gridArea">

    </div>

</div>

<!-- 収入 -->

<div class="card income-card">

    <h2>💰 収入</h2>

    <div class="income-grid">

        <button id="incomePapa">

            👨<br>
            パパ

        </button>

        <button id="incomeMama">

            👩<br>
            ママ

        </button>

        <button id="incomeExtra">

            🎁<br>
            臨時

        </button>

    </div>

    <div
        class="money"
        id="income">

        ¥0

    </div>

</div>

    <!-- 年間 -->

<div id="yearPage" class="page" style="display:none;">

    <div class="card">

        <h2>📅 年間（<span id="yearTitle">2026</span>年）</h2>

    </div>

    <div class="card">

        <h2>🎯 年間目標</h2>

        <div id="yearGoal">
            ¥0 / ¥3,400,000
        </div>

        <div class="progress">

            <div id="goalBar"></div>

        </div>

    </div>

    <div class="card">

        <h2>💰 年間合計</h2>

        <div class="summary-grid">

            <div class="summary-item">

                <div class="summary-title">
                    収入
                </div>

                <div class="summary-money" id="yearIncome">
                    ¥0
                </div>

            </div>

            <div class="summary-item">

                <div class="summary-title">
                    支出
                </div>

                <div class="summary-money" id="yearSpent">
                    ¥0
                </div>

            </div>

            <div class="summary-item">

                <div class="summary-title">
                    残り
                </div>

                <div class="summary-money" id="yearRemain">
                    ¥0
                </div>

            </div>

        </div>

    </div>

    <div class="card">

        <h2>📈 月別グラフ</h2>

        <canvas id="yearChart"></canvas>

    </div>

    <div class="card">

        <h2>🤖 AI分析</h2>

        <p id="yearAI">

            分析準備中...

        </p>

    </div>

    <div class="card">

        <h2>📒 カテゴリ分析</h2>

        <div id="yearCategory">

        </div>

    </div>

</div>
    
<nav class="bottom-nav">

    <button class="active">

        🏠<br>

        <span>ホーム</span>

    </button>

    <button>

        📊<br>

        <span>年間</span>

    </button>

    <button>

        ⚙️<br>

        <span>設定</span>

    </button>

</nav>

<script src="app.js"></script>

</body>

</html>
